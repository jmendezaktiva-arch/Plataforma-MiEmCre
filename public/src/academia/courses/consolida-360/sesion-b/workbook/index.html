<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workbook: Ecosistema Digital - Consolida 360° | Dreams</title>
    
    <link rel="icon" type="image/png" href="/assets/images/brand/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="../../../../../shared/env-config.js"></script>
    <script src="../../../../../shared/workbook-core.js"></script>
    
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        /* DREAMS PRESTIGE: Comportamiento Dinámico del Sidebar del Workbook */
        #workbook-sidebar {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            position: sticky;
            top: 0;
            height: 100vh;
            /* FORZAMOS visibilidad para permitir que el semicírculo sobresalga */
            overflow: visible !important; 
        }

        /* Estado Colapsado: La "Manija de Oro" (8px) */
        #workbook-sidebar.sidebar-collapsed {
            width: 8px !important;
            min-width: 8px !important;
            padding: 0 !important;
            border-right: 4px solid #957C3D;
            background: rgba(15, 52, 96, 0.05);
            backdrop-filter: blur(15px);
        }

        /* Lógica de Visibilidad: Ocultar todo excepto el Semicírculo */
        #workbook-sidebar.sidebar-collapsed > *:not(.sidebar-tab) {
            display: none;
        }

        /* Estado Expandido */
        #workbook-sidebar:not(.sidebar-collapsed) {
            width: 260px;
        }

        /* PESTAÑA DE ACCESO (Semicírculo Prestige) */
        .sidebar-tab {
            position: absolute;
            right: -32px;
            top: 50%;
            transform: translateY(-50%);
            background: #957C3D;
            color: white;
            width: 32px;
            height: 64px;
            display: flex !important;
            align-items: center;
            justify-content: center;
            border-radius: 0 100px 100px 0;
            cursor: pointer;
            box-shadow: 5px 0 15px rgba(149, 124, 61, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
        }

        /* Animación de Pulso (Indicador de presencia) */
        #workbook-sidebar.sidebar-collapsed .sidebar-tab {
            animation: indicator-pulse 2s infinite;
        }

        @keyframes indicator-pulse {
            0% { box-shadow: 0 0 0 0 rgba(149, 124, 61, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(149, 124, 61, 0); }
            100% { box-shadow: 0 0 0 0 rgba(149, 124, 61, 0); }
        }

        /* Ocultar sutilmente cuando el menú está abierto */
        #workbook-sidebar:not(.sidebar-collapsed) .sidebar-tab {
            opacity: 0 !important;
            pointer-events: none;
        }
    </style>
</head>

<body class="text-gray-800 bg-[#F5F5F0]">

    <div class="flex flex-col md:flex-row min-h-screen">
        
        <aside id="workbook-sidebar" class="sidebar-collapsed w-full md:w-64 bg-white shadow-lg sticky top-0 h-screen flex flex-col border-r border-gray-100">
            
            <div class="sidebar-tab">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </div>

            <div class="flex-grow overflow-y-auto overflow-x-hidden p-6 flex flex-col custom-scrollbar">
                <div class="flex items-center justify-center mb-10">
                    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" 
                        data-asset="logo.png" 
                        alt="Logo" 
                        class="h-12 w-auto" 
                        crossorigin="anonymous">
                </div>
                
                <div class="mb-8">
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Progreso Sesión B</h4>
                    <div class="w-full bg-gray-100 rounded-full h-1.5">
                        <div id="progress-bar" class="bg-brand-blue h-1.5 rounded-full transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>

                <nav id="nav-menu" class="flex-grow">
                    <ul class="space-y-1">
                        </ul>
                </nav>

                <div class="mt-auto pt-6 border-t border-gray-50 space-y-3">
                    <button id="export-pdf" class="btn-primary w-full text-xs">
                        EXPORTAR ESTRATEGIA B
                    </button>

                    <button onclick="WorkbookCore.sharing.trigger()" class="w-full bg-[#957C3D] text-white py-3 rounded-xl font-bold text-xs hover:brightness-110 transition-all flex items-center justify-center gap-2 shadow-lg shadow-orange-900/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                        </svg>
                        RECOMIENDA EL CURSO
                    </button>

                    <div id="loading" class="hidden mt-4 text-center">
                        <p class="text-[10px] text-brand-blue animate-pulse font-bold uppercase tracking-widest">Generando Reporte Digital...</p>
                    </div>
                </div>
            </div> </aside>

        <main id="main-content" class="flex-1 w-full max-w-5xl mx-auto px-4 md:px-12 py-10 overflow-y-auto">
            
            <header class="bg-white shadow-sm rounded-3xl p-8 mb-10 border-l-[12px] border-brand-blue relative overflow-hidden">
                <div class="relative z-10">
                    <h1 id="workbook-course-name" class="text-brand-blue font-black text-[34px] leading-tight uppercase tracking-tighter">Cuaderno de Trabajo Interactivo</h1>
                    <p id="workbook-session-title" class="text-lg text-gray-500 mt-1 font-light italic">"Impulsa tu PyME: Ecosistema Digital de Ventas"</p>
              
                </div>
                <div class="absolute right-[-20px] bottom-[-20px] opacity-[0.03] rotate-12">
                    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" 
                         data-asset="logo.png" 
                         alt="" 
                         class="h-40" 
                         crossorigin="anonymous">
                </div>
            </header>

            <div id="reporte" class="hidden bg-white p-12 rounded-[2rem] shadow-2xl border border-gray-100 mt-10 print:block">
                <div class="flex justify-between items-start border-b-4 border-brand-blue pb-8 mb-10">
                    <div>
                        <h2 class="text-4xl font-black text-[#0F3460] uppercase tracking-tighter">Ecosistema Digital de Ventas</h2>
                        <p class="text-gray-400 font-light italic text-xl">Consolida 360° - Plan Maestro de Acción</p>
                    </div>
                    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" 
                        data-asset="logo.png" 
                        alt="Logo" 
                        class="h-12 w-auto" 
                        crossorigin="anonymous">
                </div>
                
                <div id="reporte-dinamico-content" class="space-y-10">
                    </div>
            </div>

            <div id="workbook-sections-container" class="space-y-12">
                </div>

        </main>
    </div>

    <script src="js/workbook-logic.js"></script>

</body>
</html>
