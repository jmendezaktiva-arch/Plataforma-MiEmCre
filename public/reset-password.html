<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña | Dreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --midnight: #0F3460; --gold: #957C3D; --linen: #F5F5F0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--linen); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); padding: 40px; border-radius: 16px; border-top: 6px solid var(--gold); text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        img { width: 180px; margin-bottom: 20px; }
        button { background: var(--midnight); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <img id="main-logo" data-asset="logo.png" alt="Dreams Logo" style="width: 180px; margin-bottom: 20px; transition: opacity 0.3s;" class="opacity-0">
        <h2 style="color: var(--midnight);">Nueva Contraseña</h2>
        <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
        <button id="btn-save">ACTUALIZAR ACCESO</button>
    </div>

    <script type="module">
        // TRACEABILIDAD: Conexión con el núcleo del ecosistema
        import { auth } from './src/shared/firebase-config.js';
        import { 
            confirmPasswordReset, 
            verifyPasswordResetCode 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // MOTOR DE EXTRACCIÓN: Captura el código oobCode que Firebase inyecta en la URL
        const getActionCode = () => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('oobCode');
        };

        const actionCode = getActionCode();
        const btnSave = document.getElementById('btn-save');
        const inputPass = document.getElementById('new-password');

        // VALIDACIÓN PREVENTIVA: Si no hay código en la URL, el acceso es inválido
        if (!actionCode) {
            alert("🚨 Enlace no válido. Por favor, solicita una nueva recuperación desde el login.");
            window.location.href = 'index.html';
        }

        btnSave.addEventListener('click', async () => {
            const newPassword = inputPass.value;

            if (newPassword.length < 6) {
                alert("La seguridad Prestige requiere al menos 6 caracteres.");
                return;
            }

            btnSave.disabled = true;
            btnSave.innerText = "SINCRONIZANDO...";

            try {
                // 1. Verificación del token de seguridad enviado por correo
                await verifyPasswordResetCode(auth, actionCode);
                
                // 2. Aplicación definitiva de la nueva credencial
                await confirmPasswordReset(auth, actionCode, newPassword);
                
                alert("✅ Contraseña actualizada. Su acceso ha sido restaurado.");
                
                // Redirección determinística al login para iniciar sesión con la nueva clave
                window.location.href = 'index.html';

            } catch (error) {
                console.error("Error en el Motor de Reset:", error.code);
                let message = "El enlace ha expirado o ya fue utilizado.";
                
                if (error.code === 'auth/weak-password') message = "La contraseña es muy débil.";
                
                alert(`🚨 Error: ${message}`);
                btnSave.disabled = false;
                btnSave.innerText = "REINTENTAR";
            }
        });
    </script>
</body>
</html>
