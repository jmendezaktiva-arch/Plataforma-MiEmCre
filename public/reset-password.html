<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña | Dreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        /* Design Tokens Prestige */
        :root { 
            --midnight: #0F3460; 
            --gold: #957C3D; 
            --linen: #F5F5F0; 
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--linen); 
            background-image: radial-gradient(circle at 10% 20%, rgba(15, 52, 96, 0.05) 0%, transparent 40%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* Efecto Liquid Glass Prestige (v1.6) */
        .card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 45px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-top: 8px solid var(--gold); 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 24px 48px rgba(15, 52, 96, 0.12); 
        }

        /* Trazabilidad de Identidad Unificada */
        .logo-reset { 
            width: 180px; 
            height: auto;
            margin-bottom: 25px; 
            transition: opacity 0.5s ease;
        }

        h2 { color: var(--midnight); font-weight: 900; font-size: 1.4rem; letter-spacing: -0.5px; margin-bottom: 10px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            border: 1.5px solid rgba(15, 52, 96, 0.1); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-family: 'Montserrat';
            font-size: 0.9rem;
        }

        button { 
            background: var(--midnight); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            letter-spacing: 1px;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }
    </style>
    <script src="/src/shared/env-config.js"></script>
</head>
<body>
    <div class="card">
        <img id="main-logo" data-asset="logo.png" alt="Dreams Logo" class="logo-reset" style="opacity: 0;">
        <h2>Nueva Contraseña</h2>
        <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
        <button id="btn-save">ACTUALIZAR ACCESO</button>
    </div>

    <script type="module">
        // TRACEABILIDAD: Conexión con el núcleo del ecosistema (Imports al inicio)
        import { auth } from './src/shared/firebase-config.js';
        import { 
            confirmPasswordReset, 
            verifyPasswordResetCode 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        /**
         * MOTOR DE HIDRATACIÓN DE MARCA (Cloud Sync - v2.1)
         * Sincroniza el logo institucional siguiendo la trazabilidad de Storage.
         */
        const hydrateLogo = () => {
            const logoEl = document.getElementById('main-logo');
            
            // Verificamos que el motor de rutas esté totalmente inicializado
            if (logoEl && window.DREAMS_CONFIG && typeof window.DREAMS_CONFIG.resolvePath === 'function') {
                const assetName = logoEl.dataset.asset;
                
                // TRAZABILIDAD: Alineación exacta con la jerarquía de Firebase Storage (shared/Shared/brand)
                // El motor resolvePath suele añadir 'shared/' por defecto, por lo que 'Shared/brand' es la subruta correcta.
                const firebaseUrl = window.DREAMS_CONFIG.resolvePath(assetName, 'Shared/brand');
                
                logoEl.onerror = () => {
                    console.warn(`⚠️ CDN Fallback: Activando respaldo local para [${assetName}]`);
                    logoEl.src = `assets/img/${assetName}`;
                    logoEl.style.opacity = "1";
                };
                
                logoEl.onload = () => {
                    console.log("✅ Dreams Identity: Logo institucional sincronizado desde la nube.");
                    logoEl.style.opacity = "1";
                };

                if (firebaseUrl) {
                    logoEl.src = firebaseUrl;
                }
            } else {
                // Reintento recursivo si DREAMS_CONFIG aún no ha sido inyectado por env-config.js
                setTimeout(hydrateLogo, 100);
            }
        };

        // Inicialización coordinada con el motor de rutas
        if (window.DREAMS_CONFIG) {
            hydrateLogo();
        } else {
            setTimeout(hydrateLogo, 150); // Margen de seguridad para carga de env-config
        }

        // MOTOR DE EXTRACCIÓN: Captura el código oobCode que Firebase inyecta en la URL
        const getActionCode = () => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('oobCode');
        };

        const actionCode = getActionCode();
        const btnSave = document.getElementById('btn-save');
        const inputPass = document.getElementById('new-password');

        // VALIDACIÓN PREVENTIVA: Si no hay código en la URL, el acceso es inválido
        if (!actionCode) {
            alert("🚨 Enlace no válido. Por favor, solicita una nueva recuperación desde el login.");
            window.location.href = 'index.html';
        }

        /**
         * MOTOR DE EJECUCIÓN: Reestablecimiento de Credenciales (v2.0)
         * Aplica la nueva contraseña utilizando el token oobCode de Firebase.
         */
        btnSave.addEventListener('click', async () => {
            const newPassword = inputPass.value.trim();

            // 1. Validación de Seguridad Prestige
            if (newPassword.length < 6) {
                alert("🔐 Seguridad Dreams: La nueva contraseña debe tener al menos 6 caracteres.");
                return;
            }

            // 2. Estado de Bloqueo (Prevención de múltiples clicks)
            btnSave.disabled = true;
            const originalText = btnSave.innerText;
            btnSave.innerText = "SINCRONIZANDO...";

            try {
                // 3. Verificación de integridad del código (oobCode)
                // Esto confirma que el enlace no ha sido manipulado ni ha expirado.
                await verifyPasswordResetCode(auth, actionCode);
                
                // 4. Actualización Atómica en Firebase Auth
                await confirmPasswordReset(auth, actionCode, newPassword);
                
                // 5. Feedback de Éxito y Redirección
                alert("✅ ÉXITO: Su contraseña ha sido actualizada. Ahora puede acceder con sus nuevas credenciales.");
                
                // Usamos replace para que el usuario no pueda "regresar" a la pantalla de reset
                window.location.replace('index.html');

            } catch (error) {
                console.error("🚨 Error en el Proceso de Reset:", error.code);
                
                let userMessage = "El enlace ha expirado o ya fue utilizado. Por favor, solicita uno nuevo.";
                
                // Gestión Quirúrgica de Errores Comunes
                switch (error.code) {
                    case 'auth/weak-password':
                        userMessage = "La contraseña es demasiado débil. Intente combinar letras y números.";
                        break;
                    case 'auth/expired-action-code':
                        userMessage = "El tiempo de seguridad ha expirado. Solicite un nuevo enlace de recuperación.";
                        break;
                    case 'auth/invalid-action-code':
                        userMessage = "El código de seguridad es inválido. Intente nuevamente desde su correo.";
                        break;
                }

                alert(`⚠️ ATENCIÓN: ${userMessage}`);
                
                // Restauramos el estado del botón para permitir reintento
                btnSave.disabled = false;
                btnSave.innerText = "REINTENTAR ACCESO";
            }
        });
    </script>
</body>
</html>
