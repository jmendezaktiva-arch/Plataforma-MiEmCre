<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Intervención | Dreams Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/bento.css">
    <style>
        .agendar-container {
            padding: 40px;
            max-width: 900px;
            margin: 80px auto 0 auto;
            text-align: center;
        }
        .calendar-wrapper {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(15, 52, 96, 0.08);
            box-shadow: 0 20px 50px rgba(15, 52, 96, 0.1);
            overflow: hidden;
            height: 700px; /* Suelo de legibilidad para el calendario */
            margin-top: 30px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-ivory">
    <header class="navbar">
        <div class="nav-left">
            <span style="color: var(--primary-midnight); font-weight: 800; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">Dreams</span>
            <span style="color: var(--accent-gold); font-weight: 400; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">Platform</span>
        </div>
        <div class="nav-center">
            <h1 id="header-aura-title" style="color: var(--primary-midnight); font-weight: 700; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; opacity: 0.8;">
                Sesión Estratégica
            </h1>
        </div>
        <div class="nav-right">
            <button class="nav-btn-prestige" onclick="window.location.href='dashboard.html'">
                <span class="icon">🏠</span>
            </button>
        </div>
    </header>

    <main class="agendar-container animate-fade-in">
        <header>
            <span style="color: var(--accent-gold); font-weight: 700; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">Protocolo Prestige</span>
            <h2 style="color: var(--primary-midnight); font-weight: 900; margin-top: 10px;">SELECCIONA TU HORARIO</h2>
            <p style="color: #666; max-width: 600px; margin: 15px auto;">Para activar tu acceso, agenda tu sesión inicial vía Zoom. <br>Disponibilidad: <strong>Martes y Jueves (4:00 PM - 6:00 PM)</strong>.</p>
        </header>

        <!-- Calendly: misma URL que enlazan los correos (intervencion-notificacion) y el botón Videollamada del módulo Apps (apps-logic.js). -->
        <div class="calendar-wrapper">
            <iframe src="https://calendly.com/contacto-miempresacrece/sesion-estrategica?hide_event_types=1&hide_landing_page_details=1&primary_color=0f3460" 
                    width="100%" 
                    height="100%" 
                    frameborder="0"></iframe>
        </div>
    </main>

    <script type="module" src="src/app.js"></script>
</body>
</html>
