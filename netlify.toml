[build]
  publish = "public"
  functions = "netlify/functions"

[dev]
  port = 8888
  publish = "public"
  # Eliminamos 'command' porque usaremos el servidor estático nativo de Netlify
  # para evitar que el proceso se cierre antes de tiempo.

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200